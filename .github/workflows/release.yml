name: Release

on:
  push:
    tags:
      - "*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - uses: softprops/action-gh-release@v2
        with:
          body: |
            Release for the Obsidian community plugin directory.

            Changes:
            - Remove redundant directory context from the plugin description.
            - Publish release assets with GitHub artifact attestations.
          files: |
            main.js
            manifest.json
            styles.css
